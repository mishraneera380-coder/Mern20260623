<!DOCTYPE html>
<html>
    <head>
        <title>
            Form HTML
        </title>
        <style>
            input type {
                border-collapse: collapse;
            }

                text,
                email,
                password{
                    border: 2px solid beige;
                }
            

        </style>
    </head>
    <body>
        <form action="">
        <center>
            <h1><strong>Form page</strong></h1></center>
            <div>
                <label for="Name" >Name</label>
           <input type="text" id="Name">
        
            </div>
            <p></p>
            <div>
                <label for="Email"> Email </label>
            <input type="email" id="Email">

            </div>
            
            <p></p>
            <div>
                <label for="password">Password</label>
                            <input type="password" id="Password ">

            </div>



            <p></p>
            
            Number:<p></p>
            <input type="number">
            <p></p> Date:<p></p> <input type="date">
            <p></p>Time:<p></p>
            <input type="time"><p></p>
            Date Time:<p></p><input type="date time">
            <p></p>File:<p></p> <input type="file"><p></p>
            Color:<p></p><input type="color"> <p></p>
            Range:<p></p> <input type="range"><p></p>
            Female:<input type="radio" name="Gender">
            Male:<input type="radio" name="Gender">
            Others:<input type="radio" name="Gender"><p></p>
            B.Sc.CSIT:<input type="checkbox" name="Faculty">
            BCA:<input type="checkbox" name="Faculty">
            BBA:<input type="checkbox" name="Faculty"><p></p>
            <br>
            Select:<select name="" id="">
                <option value="B.sc.CSIT">B.sc.CSIT</option>
                <option value="BCA">BCA</option>
                <option value="BITM">BITM</option>
                <option value="BBA">BBA</option>
                <option value="BBS">BBS</option>
            </select>

            
            <hr>
            <right>Submit:<p></p> <input type="submit"></right>
            <p>
                text area:<p></p><textarea name="" id=""></textarea>
            </p>
        
        </form>


 
        
    </body>
</html>
